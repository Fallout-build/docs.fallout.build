# Build the Docusaurus site against ChrisonSimtian/Fallout@main and deploy
# to GitHub Pages (docs.fallout.build).
#
# Two checkouts:
#   1. Self (this Falloutdocs repo) — Docusaurus config, theme, components.
#   2. ChrisonSimtian/Fallout@main into ./fallout-source — the markdown
#      source-of-truth for docs/.
#
# docusaurus.config.ts is wired to read from ./fallout-source/docs.
#
# Triggers:
#   - Push to main of THIS repo (config/theme changes).
#   - Daily schedule (catches Fallout/docs/** updates without needing a
#     repository_dispatch token in Fallout).
#   - Manual workflow_dispatch.

name: deploy

on:
  push:
    branches:
      - main
  schedule:
    # 02:00 UTC daily — picks up changes to Fallout/docs/ within 24h.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Falloutdocs (this repo)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout Fallout (markdown source)
        uses: actions/checkout@v6
        with:
          repository: ChrisonSimtian/Fallout
          ref: main
          path: fallout-source
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
